services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: kaitai
      POSTGRES_PASSWORD: kaitai_pass
      POSTGRES_DB: kaitai_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kaitai -d kaitai_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    stdin_open: true
    tty: true
    environment:
      DATABASE_URL: postgresql://kaitai:kaitai_pass@db:5432/kaitai_db?schema=public
      NODE_ENV: development
    volumes:
      # ソースコードのみマウント（node_modules は image のものを使用）
      - ./src:/app/src
      - ./prisma:/app/prisma
      - ./prisma.config.ts:/app/prisma.config.ts
      - ./public:/app/public
      - ./.env:/app/.env
    depends_on:
      db:
        condition: service_healthy
    command: npm run dev

volumes:
  postgres_data:
